<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANTAGE SHOP | BY</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f1012; color: #ffffff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        /* Категории как у Плеерок */
        .category-chip { background: #1e2024; border-radius: 12px; padding: 8px 16px; font-size: 14px; white-space: nowrap; border: 1px solid #2d3035; }
        .category-active { background: #3b82f6; border-color: #3b82f6; font-weight: bold; }
        
        /* Карточка товара в стиле Playerok */
        .item-card { background: #181a1d; border-radius: 16px; overflow: hidden; border: 1px solid #24272c; transition: 0.2s; }
        .item-card:active { transform: scale(0.97); }
        .item-image { height: 120px; background: linear-gradient(45deg, #24272c, #1e2024); position: relative; }
        .item-price { background: #3b82f6; color: white; padding: 4px 10px; border-radius: 8px; font-weight: 800; font-size: 13px; position: absolute; bottom: 8px; left: 8px; }
        .item-info { padding: 12px; }
    </style>
</head>
<body class="p-0">
    <header class="p-4 flex justify-between items-center sticky top-0 bg-[#0f1012] z-50">
        <h1 class="text-xl font-black tracking-tighter uppercase">VANTAGE</h1>
        <div class="bg-[#1e2024] p-2 rounded-full px-4 text-xs font-bold text-gray-400">BYN 🇧🇾</div>
    </header>

    <div class="flex gap-2 overflow-x-auto px-4 mb-6 no-scrollbar">
        <div class="category-chip category-active">Все</div>
        <div class="category-chip">Одежда</div>
        <div class="category-chip">Обувь</div>
        <div class="category-chip">Аксессуары</div>
    </div>

    <div class="grid grid-cols-2 gap-3 px-4 pb-20">
        
        <div class="item-card shadow-lg" onclick="buyItem('Vantage Zip-Hoodie', 180)">
            <div class="item-image">
                <div class="absolute inset-0 flex items-center justify-center text-gray-600 font-bold opacity-30">VANTAGE</div>
                <div class="item-price">180.00</div>
            </div>
            <div class="item-info">
                <h3 class="text-sm font-semibold truncate uppercase">Zip-Hoodie Black</h3>
                <p class="text-[10px] text-gray-500 mt-1 uppercase">Premium Cotton</p>
            </div>
        </div>

        <div class="item-card shadow-lg" onclick="buyItem('Vantage Sneakers', 240)">
            <div class="item-image">
                <div class="absolute inset-0 flex items-center justify-center text-gray-600 font-bold opacity-30">VANTAGE</div>
                <div class="item-price">240.00</div>
            </div>
            <div class="item-info">
                <h3 class="text-sm font-semibold truncate uppercase">Vantage Sneakers V1</h3>
                <p class="text-[10px] text-gray-500 mt-1 uppercase">Limited Edition</p>
            </div>
        </div>

        </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        function buyItem(name, price) {
            // Виброотклик как в дорогих приложениях
            tg.HapticFeedback.impactOccurred('medium');
            
            const data = JSON.stringify({ item: name, price: price });
            tg.sendData(data); // Отправляет данные боту
        }
    </script>
</body>
</html>
