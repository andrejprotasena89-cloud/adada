<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VANTAGE STORE PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; overflow-x: hidden; margin: 0; }
        .old-money { font-family: 'Cinzel', serif; color: #f2e3c6; letter-spacing: 3px; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; padding-bottom: 100px; }
        .item-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 4px; overflow: hidden; transition: 0.3s; position: relative; }
        .item-card img { width: 100%; height: 220px; object-fit: cover; background: #111; }
        .item-info { padding: 12px; border-top: 1px solid #1a1a1a; text-align: center; }
        .btn-gold { background: #f2e3c6; color: #000; font-weight: 700; padding: 12px; width: 100%; text-transform: uppercase; border-radius: 4px; display: block; }
        .btn-order { border: 1px solid #f2e3c6; color: #f2e3c6; padding: 10px; width: 100%; margin-top: 10px; border-radius: 2px; text-transform: uppercase; font-size: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-order:active { background: #f2e3c6; color: #000; }
        #admin-panel { display: none; position: fixed; inset: 0; background: #000; z-index: 100; padding: 25px; overflow-y: auto; }
        .input-gold { background: #0a0a0a; border: 1px solid #222; color: #fff; padding: 12px; border-radius: 4px; width: 100%; margin-bottom: 10px; outline: none; }
        .hidden { display: none !important; }
        .admin-btn-trigger { position: fixed; bottom: 20px; right: 20px; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 50%; z-index: 99; border: 1px solid #333; }
    </style>
</head>
<body>

    <header class="pt-10 pb-6 text-center bg-black">
        <h1 class="old-money text-3xl">VANTAGE</h1>
        <p class="text-[8px] tracking-[5px] text-zinc-600 mt-2 uppercase">Quality Over Quantity</p>
    </header>

    <div id="shop-grid" class="grid-container">
        </div>

    <button id="admin-trigger" class="admin-btn-trigger hidden" onclick="toggleAdmin()">⚙️</button>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-8">
            <h2 class="old-money text-xl">ADD ITEM</h2>
            <button onclick="toggleAdmin()" class="text-3xl">&times;</button>
        </div>
        <input type="text" id="p-name" class="input-gold" placeholder="Название">
        <input type="text" id="p-price" class="input-gold" placeholder="Цена">
        <input type="text" id="p-img" class="input-gold" placeholder="Ссылка на фото (.jpg / .png)">
        <button class="btn-gold" onclick="addProduct()">Опубликовать</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const ADMIN_IDS = [7764872610, 7771254911]; 
        const MANAGER_USERNAME = "andrejprotasena89-cloud"; // Твой ник в ТГ БЕЗ @ (куда пойдет заказ)
        
        const currentUser = tg.initDataUnsafe.user?.id;
        if (ADMIN_IDS.includes(currentUser)) {
            document.getElementById('admin-trigger').classList.remove('hidden');
        }

        const firebaseConfig = {
            apiKey: "AIzaSyCqoOfanx6bw08t3YnVKFji0f8Gz7vdLfk",
            databaseURL: "https://vantage-shop-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("products");

        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function addProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value;
            if (name && price && img) {
                db.push({ name, price, img });
                alert("Улетело в базу!");
                toggleAdmin();
            }
        }

        // ГЛАВНОЕ: Функция заказа
        function makeOrder(name, price) {
            const text = encodeURIComponent(`Привет! Хочу заказать: ${name}\nЦена: ${price}`);
            // Открываем чат с тобой
            window.open(`https://t.me/${MANAGER_USERNAME}?text=${text}`, '_blank');
        }

        db.on("value", (snap) => {
            const grid = document.getElementById('shop-grid');
            grid.innerHTML = "";
            snap.forEach((child) => {
                const p = child.val();
                grid.insertAdjacentHTML('beforeend', `
                    <div class="item-card">
                        <img src="${p.img}" onerror="this.src='https://via.placeholder.com/300x400?text=Check+Link'">
                        <div class="item-info">
                            <div class="text-[10px] font-bold uppercase text-white">${p.name}</div>
                            <div class="text-[#f2e3c6] text-[11px] font-bold mt-1">${p.price}</div>
                            <button class="btn-order" onclick="makeOrder('${p.name}', '${p.price}')">Order Now</button>
                        </div>
                    </div>
                `);
            });
        });
    </script>
</body>
</html>
