<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VANTAGE SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0c0d; color: #ffffff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .item-card { background: #1a1c1f; border-radius: 18px; border: 1px solid #2d3035; transition: 0.2s; position: relative; }
        .item-card:active { transform: scale(0.96); }
        .price-tag { background: #3b82f6; border-radius: 8px; padding: 4px 10px; font-weight: 900; position: absolute; bottom: 8px; left: 8px; font-size: 12px; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        /* Модальное окно как в Playerok */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; backdrop-filter: blur(5px); align-items: flex-end; }
        .modal-content { background: #1a1c1f; width: 100%; border-radius: 24px 24px 0 0; padding: 24px; animation: slideUp 0.3s ease-out; border-top: 1px solid #2d3035; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="p-0">
    <header class="p-5 flex justify-between items-center bg-[#0b0c0d] sticky top-0 z-50">
        <h1 class="text-2xl font-black italic tracking-tighter">VANTAGE</h1>
        <div class="text-[10px] bg-zinc-800 px-3 py-1 rounded-full text-gray-400 font-bold uppercase">Minsk, BY 🇧🇾</div>
    </header>

    <div class="grid grid-cols-2 gap-3 px-4 pb-24">
        <div class="item-card p-2" onclick="openModal('Vantage Hoodie', 180, 'Premium плотность, оверсайз крой. Лимитированная серия 2026.')">
            <div class="h-44 bg-zinc-800 rounded-xl flex items-center justify-center relative">
                <span class="text-zinc-700 font-black text-3xl">VANTAGE</span>
                <div class="price-tag">180.00</div>
            </div>
            <div class="p-2">
                <h3 class="text-[13px] font-bold uppercase truncate">Zip-Hoodie "Shadow"</h3>
                <p class="text-[9px] text-gray-500 uppercase mt-1">Cotton 100%</p>
            </div>
        </div>

        <div class="item-card p-2" onclick="openModal('Vantage Pants', 145, 'Карго брюки с водоотталкивающей пропиткой. 6 карманов.')">
            <div class="h-44 bg-zinc-800 rounded-xl flex items-center justify-center relative">
                <span class="text-zinc-700 font-black text-3xl">VANTAGE</span>
                <div class="price-tag">145.00</div>
            </div>
            <div class="p-2">
                <h3 class="text-[13px] font-bold uppercase truncate">Tech Cargo V2</h3>
                <p class="text-[9px] text-gray-500 uppercase mt-1">Techwear line</p>
            </div>
        </div>
    </div>

    <div id="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="w-12 h-1 bg-zinc-700 rounded-full mx-auto mb-6"></div>
            <h2 id="m-title" class="text-2xl font-black uppercase mb-2"></h2>
            <p id="m-desc" class="text-gray-400 text-sm mb-6 leading-relaxed"></p>
            <div class="flex justify-between items-center mb-8">
                <span class="text-gray-500 font-bold">К оплате:</span>
                <span id="m-price" class="text-2xl font-black text-blue-500"></span>
            </div>
            <button onclick="confirmOrder()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl transition shadow-lg shadow-blue-600/20 uppercase tracking-widest">Купить сейчас</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let currentItem = {};
        tg.expand();

        function openModal(name, price, desc) {
            currentItem = { name, price };
            document.getElementById('m-title').innerText = name;
            document.getElementById('m-price').innerText = price + " BYN";
            document.getElementById('m-desc').innerText = desc;
            document.getElementById('modal').style.display = 'flex';
            tg.HapticFeedback.impactOccurred('medium');
        }

        function closeModal(e) {
            document.getElementById('modal').style.display = 'none';
        }

        function confirmOrder() {
            tg.HapticFeedback.notificationOccurred('success');
            tg.sendData(JSON.stringify({ item: currentItem.name, price: currentItem.price }));
        }
    </script>
</body>
</html>
